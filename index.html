<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyglotDiary</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 0 20px; line-height: 1.6; color: #333; }
        textarea { width: 100%; height: 120px; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; }
        .btn-blue { background-color: #007bff; color: white; }
        .btn-green { background-color: #28a745; color: white; }
        .entry { border: 1px solid #ddd; padding: 15px; margin-top: 15px; border-radius: 8px; background: #fff; }
        pre { white-space: pre-wrap; background: #f4f4f4; padding: 10px; border-radius: 4px; font-size: 0.9em; }
        .msg { color: #28a745; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [text, setText] = useState('');
            const [level, setLevel] = useState('B1');
            const [feedback, setFeedback] = useState('');
            const [history, setHistory] = useState([]);
            const [copied, setCopied] = useState(false); // コピー完了メッセージ用の状態

            useEffect(() => {
                const saved = localStorage.getItem('polyglot_diary_v1');
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            const handleCopy = () => {
                const prompt = `@PolyglotDiary\n以下のスペイン語の日記を添削して。目標レベルは${level}です。\n---\n${text}`;
                
                // 1. 同期的にコピー
                navigator.clipboard.writeText(prompt);
                
                // 2. 画面にメッセージを表示（3秒で消える）
                setCopied(true);
                setTimeout(() => setCopied(false), 3000);

                // 3. アラートなどの「待ち時間」を作らずに、一瞬で開く（空白ページ対策）
                window.open("https://gemini.google.com/app", "_blank");
            };

            const handleSave = () => {
                if (!text || !feedback) return alert("日記とフィードバックを入力してください");
                const newEntry = {
                    id: Date.now(),
                    date: new Date().toLocaleString(),
                    original: text,
                    ai: feedback,
                    level: level
                };
                const newHistory = [newEntry, ...history];
                setHistory(newHistory);
                localStorage.setItem('polyglot_diary_v1', JSON.stringify(newHistory));
                setText('');
                setFeedback('');
                alert("保存しました！");
            };

            return (
                <div>
                    <h1>📓 PolyglotDiary</h1>
                    
                    <h3>1. Escribe tu diario</h3>
                    <select value={level} onChange={(e) => setLevel(e.target.value)} style={{marginBottom: '10px'}}>
                        <option value="A2">A2 (Principiante)</option>
                        <option value="B1">B1 (Intermedio)</option>
                        <option value="B2">B2 (Avanzado)</option>
                    </select>
                    <textarea value={text} onChange={(e) => setText(e.target.value)} placeholder="Escribe aquí..." />
                    
                    <div style={{ display: 'flex', alignItems: 'center' }}>
                        <button className="btn-blue" onClick={handleCopy}>Geminiを開いて添削</button>
                        {copied && <span className="msg">✓ コピーしました！</span>}
                    </div>

                    <h3 style={{marginTop: '30px'}}>2. Guardar feedback</h3>
                    <textarea value={feedback} onChange={(e) => setFeedback(e.target.value)} placeholder="Geminiの回答をペースト..." />
                    <button className="btn-green" onClick={handleSave}>履歴に保存</button>

                    <h3 style={{marginTop: '40px'}}>🕒 Historial</h3>
                    {history.map(item => (
                        <div key={item.id} className="entry">
                            <small>{item.date} [{item.level}]</small>
                            <p><strong>Original:</strong> {item.original}</p>
                            <strong>Feedback:</strong>
                            <pre>{item.ai}</pre>
                        </div>
                    ))}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
